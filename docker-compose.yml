version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - redrainbow-network

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/redrainbow
      - MONGO_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=supersecretkey
    depends_on:
      - db
      - mongo
      - redis
    networks:
      - redrainbow-network

  celery_worker:
    build:
      context: ./backend
    command: celery -A app.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/redrainbow
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis
    networks:
      - redrainbow-network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=redrainbow
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - redrainbow-network

  mongo:
    image: mongo:6.0
    volumes:
      - mongo_data:/data/db
    networks:
      - redrainbow-network

  redis:
    image: redis:alpine
    networks:
      - redrainbow-network

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - redrainbow-network

volumes:
  db_data:
  mongo_data:
  neo4j_data:

networks:
  redrainbow-network:
    driver: bridge
